<!DOCTYPE html>
<html>
<head>
  <title>Plate Match Result</title>
</head>
<body>
  <h2>Match Found</h2>
  <div id="result"></div>

  <script>
    const record = JSON.parse(localStorage.getItem('matchedRecord'));
    const resultBox = document.getElementById('result');

    if (!record) {
      resultBox.innerHTML = '<p style="color:red;">No matching record found.</p>';
    } else {
      const fields = ["Vehicle Type", "State / GOV", "Location", "Date", "Time"];
      resultBox.innerHTML = fields.map(f => 
        `<p><strong>${f}:</strong> ${record[f] || 'N/A'}</p>`
      ).join('');
    }
  </script>
</body>
</html>
